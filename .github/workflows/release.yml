name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: scape-ctl_linux_amd64
            container: ghcr.io/charlietran/scape-ctl/builder:latest
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: scape-ctl_darwin_arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: scape-ctl_windows_amd64

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory (container only)
        if: matrix.container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Go
        if: ${{ !matrix.container }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Linux deps
        if: matrix.goos == 'linux'
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            gcc pkg-config libhidapi-dev libudev-dev \
            libayatana-appindicator3-dev libgtk-3-dev

      - name: Install macOS deps
        if: matrix.goos == 'darwin'
        run: brew install hidapi

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ matrix.artifact }}/${{ matrix.goos == 'windows' && 'scape-ctl.exe' || 'scape-ctl' }} \
            ./cmd/scape-ctl

      - name: Add extras to archive
        shell: bash
        run: |
          cp README.md config.example.toml ${{ matrix.artifact }}/
          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp 50-fractal.rules ${{ matrix.artifact }}/
          fi

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.goos == 'windows'
        shell: bash
        run: 7z a ${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.goos == 'windows' && 'zip' || 'tar.gz' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
